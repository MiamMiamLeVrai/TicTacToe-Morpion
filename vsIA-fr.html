        <img src="assets/img/png/Logo_Morpion.png" alt="Image d'affiche du Morpion" class="logo-title" width="410"
            height="410" fetchpriority="high" decoding="async">
        <h1>Morpion VS IA - Jouez directement !</h1>
    </header>
    <div class="background"></div>
    <main>
        <section class="morpion-classic">
            <h2>Morpion VS IA</h2>
            <div class="grid" aria-label="Grille du morpion" role="grid">
                <button class="cell" data-cell="0" aria-label="Case vide, ligne 1, colonne 1"></button>
                <button class="cell" data-cell="1" aria-label="Case vide, ligne 1, colonne 2"></button>
                <button class="cell" data-cell="2" aria-label="Case vide, ligne 1, colonne 3"></button>
                <button class="cell" data-cell="3" aria-label="Case vide, ligne 2, colonne 1"></button>

                <button class="cell" data-cell="6" aria-label="Case vide, ligne 3, colonne 1"></button>
                <button class="cell" data-cell="7" aria-label="Case vide, ligne 3, colonne 2"></button>
                <button class="cell" data-cell="8" aria-label="Case vide, ligne 3, colonne 3"></button>
            </div>
        </section>

        <aside aria-labelledby="infos-title">
            <section class="player-choice">
                <h2>Choisissez votre symbole</h2>
                <div class="buttons">
                    <button id="startBtn" aria-label="Tire au sort">Tire au sort !</button>
                </div>
            </section>
            <p id="playerSymbol" role="status" aria-live="polite"></p>
            <section class="player-infos">
                <h2 id="infos-title">Informations de la partie</h2>
                <p id="winsInfos" aria-live="polite" role="status"></p>
            </section>

            <div class="buttons">
                <button id="restartButton" aria-label="Recommencer la partie" disabled>Recommencer la partie</button>
            </div>
        </aside>
